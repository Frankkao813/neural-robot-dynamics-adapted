env:
  env_name: AnymalJointPositionControl
  env_mode: ground-truth
  model_path: ../../pretrained_models/NeRD_models/Anymal/model/nn/model.pt
  num_envs: 2

  max_episode_length: 1000
  reward_bias: 0.0

  warp_env_cfg:
    obs_type: dflex
    task: forward
    random_reset: false
    camera_tracking: false
    # Explicit Warp coordinates. Warp Y is vertical, so the usual horizontal
    # Y coordinate is represented here by Warp Z.
    env_positions:
      - [10.0, 0.0, 0.0]
      - [0.0, 0.0, 10.0]
    # Robot 1 faces -X. Robot 2 faces Warp -Z, corresponding to
    # conventional -Y on the horizontal plane.
    heading_yaws: [3.141592653589793, 1.5707963267948966]

rl:
  config:
    name: AnymalPPO
    max_epochs: 1000
    horizon_length: 32
    normalize_input: true
    normalize_value: true
    reward_shaper:
      scale_value: 1.0
    normalize_advantage: true
    gamma: 0.99
    tau: 0.95
    learning_rate: 0.0003
    lr_schedule: adaptive
    kl_threshold: 0.008
    score_to_win: 3000000
    save_best_after: 10
    save_frequency: 50
    grad_norm: 1.0
    entropy_coef: 0.0
    truncate_grads: true
    e_clip: 0.2
    minibatch_size: 16384
    mini_epochs: 5
    critic_coef: 4
    clip_value: true
    seq_length: 8
    bounds_loss_coef: 0.0001

    player:
      determenistic: true
      games_num: 2
      num_actors: 2
      print_stats: true

  network:
    mlp:
      units: [128, 64, 32]
      activation: relu
      d2rl: false
      initializer:
        name: default
      regularizer:
        name: null

  other_params:
    fixed_sigma: true
