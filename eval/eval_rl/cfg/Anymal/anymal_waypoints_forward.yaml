env:
  env_name: AnymalJointPositionControl
  env_mode: ground-truth
  model_path: ../../pretrained_models/NeRD_models/Anymal/model/nn/model.pt
  num_envs: 1

  max_episode_length: 1500
  reward_bias: 0.

  warp_env_cfg:
    obs_type: dflex
    task: forward
    random_reset: false
    camera_tracking: true
    heading_yaws: [0.0]
    waypoint_tolerance: 0.75
    terminate_on_last_waypoint: true
    # Warp uses Y-up, so these are (X, Y, Z) waypoints on the ground plane.
    # This mirrors the Husky example path after mapping Husky's planar Y to Warp Z.
    waypoints:
      - [2.0, 0.0, 1.0]
      - [4.0, 0.0, 3.0]
      - [2.0, 0.0, 5.0]
      - [0.0, 0.0, 3.0]

rl:
  config:
    name: AnymalPPO
    max_epochs: 1000
    horizon_length: 32
    normalize_input: True
    normalize_value: True
    reward_shaper:
      scale_value: 1.
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    learning_rate: 0.0003
    lr_schedule: adaptive
    kl_threshold: 0.008
    score_to_win: 3000000
    save_best_after: 10
    save_frequency: 50
    grad_norm: 1.0
    entropy_coef: 0.0
    truncate_grads: True
    e_clip: 0.2
    minibatch_size: 16384
    mini_epochs: 5
    critic_coef: 4
    clip_value: True
    seq_length: 8
    bounds_loss_coef: 0.0001

    player:
      determenistic: True
      games_num: 1
      num_actors: 1
      print_stats: True

  network:
    mlp:
      units: [128, 64, 32]
      activation: relu
      d2rl: False
      initializer:
        name: default
      regularizer:
        name: None

  other_params:
    fixed_sigma: True
